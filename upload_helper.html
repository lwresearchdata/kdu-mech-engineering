<!DOCTYPE html>
<html>
<head>
  <title>Photo Upload Helper - KDU Mech Dept</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #0a1628; color: #fff; }
    .instruction { background: #112244; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
    code { background: #1a3060; padding: 2px 6px; border-radius: 4px; }
    button { background: #c9a227; color: #0a1628; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>📸 Photo Upload Helper</h1>
  
  <div class="instruction">
    <h3>📋 How to Use:</h3>
    <ol>
      <li>Open your Admin Panel and add/edit students</li>
      <li>When you add a photo, the system suggests a filename</li>
      <li>Save the photo to your computer with that filename</li>
      <li>Upload all photos to GitHub in the correct folder</li>
    </ol>
  </div>

  <div>
    <h3>📤 Export All Photo URLs for Download</h3>
    <button onclick="generateDownloadList()">Generate Photo List</button>
    <div id="output" style="margin-top: 20px; background: #112244; padding: 15px; border-radius: 8px; white-space: pre-wrap;"></div>
  </div>

  <script>
    function generateDownloadList() {
      // Get data from localStorage
      const stored = localStorage.getItem('kdu_students');
      if (!stored) {
        document.getElementById('output').innerHTML = 'No student data found. Add students first.';
        return;
      }
      
      const students = JSON.parse(stored);
      const photosNeeded = students.filter(s => s.photo && s.photo.startsWith('images/'));
      
      let html = '<h4>📸 Photos to Upload to GitHub:</h4><ul>';
      photosNeeded.forEach(s => {
        html += `<li><code>${s.photo}</code> - Student: ${s.name} (${s.regNo})</li>`;
      });
      html += '</ul><p>📁 Upload these files to your GitHub repo in the <code>images/students/intakeXX/</code> folder.</p>';
      
      document.getElementById('output').innerHTML = html;
    }
  </script>
</body>
</html>
